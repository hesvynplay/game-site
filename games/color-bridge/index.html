<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=portrait">
    <meta name="description" content="Color Bridge - A fast-paced color switching arcade game. Tap to match colors and survive as long as you can!">
    <title>Color Bridge</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 9/16;
            background: #0a0a12;
        }
        @media (min-width: 900px) {
            #gameContainer {
                width: min(90vw, calc(96vh * 4 / 5), 700px);
                aspect-ratio: 4 / 5;
                max-width: none;
            }
            .screen {
                max-width: 520px;
            }
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hidden { display: none !important; }
        
        .screen {
            background: rgba(8, 8, 14, 0.97);
            border-radius: 24px;
            padding: 34px 26px;
            pointer-events: auto;
            width: 86%;
            max-width: 400px;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        h1 {
            font-size: 2.6em;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.95;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #8888a0;
            margin-bottom: 22px;
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .btn {
            border: none;
            color: white;
            padding: 16px 36px;
            font-size: 1.05em;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: linear-gradient(135deg, #ff4d4d, #ff6b6b);
            box-shadow: 0 6px 24px rgba(255, 77, 77, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
        }
        
        .section-title {
            color: #666680;
            font-size: 0.7em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 18px 0 10px;
        }
        
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 12px 4px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7em;
            font-weight: 800;
        }
        .mode-btn.active {
            border-color: #4da6ff;
            background: rgba(77, 166, 255, 0.12);
        }
        .mode-icon {
            font-size: 1.5em;
            display: block;
            margin-bottom: 3px;
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .theme-btn {
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .theme-btn.active {
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.25);
        }
        .theme-btn::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: 900;
            font-size: 1.1em;
            opacity: 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .theme-btn.active::after { opacity: 1; }
        
        #topBar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        #pauseBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #muteBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #levelBadge {
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85em;
            box-shadow: 0 0 20px rgba(255,0,204,0.4);
        }
        #zenLives {
            color: #00ff88;
            font-size: 1.6em;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
            line-height: 1;
        }
        #livesDisplay {
            display: flex;
            gap: 5px;
            filter: drop-shadow(0 0 8px rgba(255, 77, 77, 0.5));
        }
        .heart {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }
        .heart.lost {
            opacity: 0.5;
            transform: scale(0.9);
        }
        
        #rainbowBadge {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ff4d4d, #ffdd33, #4da6ff, #ff00ff);
            color: #000;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.8em;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        #heavyBlockBadge {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ff6b35, #ff4d4d);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.8em;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,107,53,0.45);
        }
        #scoreCenter {
            position: absolute;
            top: 64px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #scoreValue {
            color: white;
            font-size: 2.2em;
            font-weight: 900;
            text-shadow: 0 2px 16px rgba(0,0,0,0.6);
            line-height: 1;
        }
        
        #recoveryGaugeWrap {
            width: 120px;
            height: 6px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            margin: 8px auto 3px;
            overflow: hidden;
        }
        #recoveryGaugeFill {
            height: 100%;
            width: 0%;
            background: #00ff88;
            box-shadow: 0 0 8px rgba(0,255,136,0.5);
            transition: width 0.15s ease;
        }
        #recoveryGaugeText {
            color: rgba(255,255,255,0.65);
            font-size: 0.55em;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        #comboValue {
            color: #ffdd33;
            font-size: 1em;
            font-weight: 900;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 0 12px rgba(255,221,51,0.4);
        }
        #feverBadge {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.8em;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,0,204,0.5);
        }
        
        #safeBadge {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #00ff88, #00cc66);
            color: #000;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.8em;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        
        #saveBadge {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ffdd33, #ffaa00);
            color: #000;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.8em;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,221,51,0.5);
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 18px 0;
        }
        .stat-box {
            text-align: center;
        }
        .stat-value {
            color: #fff;
            font-size: 1.6em;
            font-weight: 900;
        }
        .stat-label {
            color: #666680;
            font-size: 0.65em;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        #rankingList {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 8px;
            margin: 10px 0;
            text-align: left;
            max-height: 240px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 7px 6px;
            color: #fff;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.9em;
        }
        .ranking-item:last-child { border-bottom: none; }
        .ranking-item.current {
            background: rgba(77, 166, 255, 0.18);
            border-radius: 8px;
            box-shadow: 0 0 0 2px rgba(77,166,255,0.5) inset;
        }
        .rank { font-weight: 900; width: 42px; flex-shrink: 0; }
        .rank-1 { color: #ffdd33; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .ranking-item .r-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin: 0 8px;
            color: #d8d8e8;
        }
        .ranking-item.current .r-name { color: #fff; }
        .ranking-item .r-score { font-weight: 900; color: #fff; flex-shrink: 0; }

        #playerNameInput {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 13px 14px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9em;
            outline: none;
            margin-bottom: 4px;
        }
        #playerNameInput:focus { border-color: #4da6ff; }
        #playerNameInput::placeholder { color: rgba(255,255,255,0.3); }

        #rankSummary {
            text-align: center;
            font-weight: 900;
            font-size: 1em;
            letter-spacing: 1px;
            color: #4da6ff;
            margin: 12px 0 2px;
            min-height: 20px;
        }
        #rankSummary.out { color: #ff8888; }

        .rank-tabs {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .rank-tab-group {
            display: flex;
            gap: 6px;
        }
        .rank-tab {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 8px 4px;
            color: #9a9ab0;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7em;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .rank-tab.active {
            color: #fff;
            border-color: #4da6ff;
            background: rgba(77, 166, 255, 0.12);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="topBar" class="hidden">
            <button id="pauseBtn">⏸</button>
            <button id="muteBtn">🔊</button>
            <div id="levelBadge">LV 1</div>
            <div id="livesDisplay">
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4d4d"/></svg>
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4d4d"/></svg>
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4d4d"/></svg>
            </div>
            <div id="zenLives" class="hidden">∞</div>
        </div>
        
        <div id="scoreCenter" class="hidden">
            <div id="scoreValue">0</div>
            <div id="comboValue">x0</div>
            <div id="recoveryGaugeWrap"><div id="recoveryGaugeFill"></div></div>
            <div id="recoveryGaugeText">LIFE 0/10</div>
        </div>
        <div id="feverBadge">FEVER x2</div>
        <div id="safeBadge">SAFE!</div>
        <div id="saveBadge">SAVE CHANCE!</div>
        <div id="rainbowBadge">RAINBOW BRIDGE!</div>
        <div id="heavyBlockBadge">HEAVY x3</div>
        
        <div id="ui">
            <div id="startScreen" class="screen">
                <h1 style="background: linear-gradient(90deg, #ff4d4d, #4da6ff, #ffdd33); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">COLOR<br>BRIDGE</h1>
                <p class="subtitle">TAP TO SWITCH COLORS</p>
                
                <div class="section-title">NAME</div>
                <input id="playerNameInput" type="text" maxlength="20" placeholder="ENTER NAME (OPTIONAL)" autocomplete="off">

                <div class="section-title">MODE</div>
                <div class="mode-grid">
                    <button class="mode-btn active" data-mode="classic"><span class="mode-icon">⚡</span>CLASSIC</button>
                    <button class="mode-btn" data-mode="hard"><span class="mode-icon">🔥</span>HARD</button>
                    <button class="mode-btn" data-mode="zen"><span class="mode-icon">🌿</span>ZEN</button>
                </div>
                
                <button class="btn btn-primary" id="startBtn">PLAY</button>
                <div style="font-size:0.6em; color:rgba(255,255,255,0.35); margin-top:14px; text-align:center;">Music: Geometric Memory — HTb-music (Pixabay)</div>
                <div style="font-size:0.55em; color:rgba(0,255,136,0.7); margin-top:4px; text-align:center; font-weight:800; letter-spacing:1px;">BUILD v7 · SCORE FIX</div>
            </div>
            
            <div id="gameOverScreen" class="screen hidden">
                <h1 style="font-size: 2.2em; color: #ff4d4d;">GAME OVER</h1>
                <div id="finalScore" style="color: white; font-size: 3.2em; font-weight: 900; margin: 8px 0 2px;">0</div>
                <div style="display:flex; justify-content:center; gap:12px; align-items:center; margin-bottom:8px;">
                    <div id="scoreDiff" style="font-weight:900; font-size:0.9em; opacity:0;"></div>
                    <div id="bestLabel" style="color: #ffd700; font-weight: 900; font-size: 0.85em; opacity: 0;">NEW BEST!</div>
                </div>
                
                <div class="stats-row">
                    <div class="stat-box"><div class="stat-value" id="statLevel">1</div><div class="stat-label">LEVEL</div></div>
                    <div class="stat-box"><div class="stat-value" id="statMaxCombo">0</div><div class="stat-label">MAX COMBO</div></div>
                    <div class="stat-box"><div class="stat-value" id="statBlocks">0</div><div class="stat-label">BLOCKS</div></div>
                </div>
                
                <div id="rankSummary">—</div>
                <div class="rank-tabs">
                    <div class="rank-tab-group">
                        <button class="rank-tab period-tab active" data-period="daily">DAILY</button>
                        <button class="rank-tab period-tab" data-period="weekly">WEEKLY</button>
                    </div>
                </div>
                <div id="rankingList"></div>
                
                <button class="btn btn-primary" id="restartBtn">RETRY</button>
                <button class="btn btn-secondary" id="menuBtn" style="margin-top:10px">MENU</button>
            </div>
            
            <div id="pauseScreen" class="screen hidden">
                <h1 style="font-size: 2em; color: #fff; margin-bottom: 24px;">PAUSED</h1>
                
                <button class="btn btn-primary" id="resumeBtn">RESUME</button>
                <button class="btn btn-secondary" id="pauseMenuBtn" style="margin-top:10px">MENU</button>
                <div style="font-size:0.6em; color:rgba(255,255,255,0.35); margin-top:14px; text-align:center;">Music: Geometric Memory — HTb-music (Pixabay)</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        console.log('%c Color Bridge BUILD v7 · SCORE FIX ', 'background:#00e676;color:#000;font-weight:bold;');
        const screens = {
            start: document.getElementById('startScreen'),
            gameOver: document.getElementById('gameOverScreen'),
            pause: document.getElementById('pauseScreen')
        };
        const ui = {
            score: document.getElementById('scoreValue'),
            combo: document.getElementById('comboValue'),
            comboDisplay: document.getElementById('comboValue'),
            feverBadge: document.getElementById('feverBadge'),
            safeBadge: document.getElementById('safeBadge'),
            saveBadge: document.getElementById('saveBadge'),
            rainbowBadge: document.getElementById('rainbowBadge'),
            heavyBlockBadge: document.getElementById('heavyBlockBadge'),
            scoreCenter: document.getElementById('scoreCenter'),
            topBar: document.getElementById('topBar'),
            pauseBtn: document.getElementById('pauseBtn'),
            muteBtn: document.getElementById('muteBtn'),
            levelBadge: document.getElementById('levelBadge'),
            livesDisplay: document.getElementById('livesDisplay'),
            zenLives: document.getElementById('zenLives'),
            finalScore: document.getElementById('finalScore'),
            bestLabel: document.getElementById('bestLabel'),
            scoreDiff: document.getElementById('scoreDiff'),
            recoveryGaugeFill: document.getElementById('recoveryGaugeFill'),
            recoveryGaugeText: document.getElementById('recoveryGaugeText'),
            rankingList: document.getElementById('rankingList'),
            playerNameInput: document.getElementById('playerNameInput'),
            rankSummary: document.getElementById('rankSummary')
        };
        const stats = {
            level: document.getElementById('statLevel'),
            maxCombo: document.getElementById('statMaxCombo'),
            blocks: document.getElementById('statBlocks')
        };
        
        const THEMES = {
            neon: [
                { name: 'red', hex: '#ff4d4d', glow: 'rgba(255, 77, 77, 0.6)' },
                { name: 'blue', hex: '#4da6ff', glow: 'rgba(77, 166, 255, 0.6)' },
                { name: 'yellow', hex: '#ffdd33', glow: 'rgba(255, 221, 51, 0.6)' }
            ]
        };
        
        const HARD_COLORS = [
            { name: 'red', hex: '#ff4d4d', glow: 'rgba(255, 77, 77, 0.6)' },
            { name: 'blue', hex: '#4da6ff', glow: 'rgba(77, 166, 255, 0.6)' },
            { name: 'yellow', hex: '#ffdd33', glow: 'rgba(255, 221, 51, 0.6)' },
            { name: 'green', hex: '#00e676', glow: 'rgba(0, 230, 118, 0.6)' }
        ];
        
        const MODES = {
            classic: { speedMult: 0.85, spawnMult: 1.0, feverThreshold: 10, scoreMult: 1.0 },
            hard: { speedMult: 1.15, spawnMult: 0.7, feverThreshold: 8, scoreMult: 1.5 },
            zen: { speedMult: 0.75, spawnMult: 1.15, feverThreshold: 12, scoreMult: 0.8 }
        };
        
        const LEVEL_CONFIG = [
            { level: 1, scoreNeeded: 0, colors: 3, speedAdd: 0, effects: [] },
            { level: 2, scoreNeeded: 150, colors: 3, speedAdd: 0.8, effects: ['pulse'] },

        function periodStartISO(period) {
            const now = new Date();
            if (period === 'weekly') {

            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0).toISOString();
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({

            })[c]);
        }

        function renderRankingRows(rows, selfName) {
            ui.rankingList.innerHTML = '';
            if (!rows || rows.length === 0) {
                ui.rankingList.innerHTML = '<div class="ranking-item"><span class="rank">—</span><span class="r-name"></span><span class="r-score"></span></div>';
                return -1;
            }
            let selfRank = -1;
            let selfEl = null;
            const frag = document.createDocumentFragment();
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                const isSelf = selfName != null && r.name === selfName && selfRank === -1;
                if (isSelf) selfRank = i + 1;
                const div = document.createElement('div');
                div.className = 'ranking-item' + (isSelf ? ' current' : '');
                div.innerHTML =
                    `<span class="rank ${rankClass}">${i + 1}</span>` +
                    `<span class="r-name">${escapeHtml(r.name)}</span>` +
                    `<span class="r-score">${r.score}</span>`;
                frag.appendChild(div);
                if (isSelf) selfEl = div;
            }
            ui.rankingList.appendChild(frag);
            if (selfEl) {
                // auto-scroll so the player's row sits in the middle of the list
                requestAnimationFrame(() => {
                    const target = selfEl.offsetTop - ui.rankingList.clientHeight / 2 + selfEl.clientHeight / 2;
                    ui.rankingList.scrollTop = Math.max(0, target);
                });
            }
            return selfRank;
        }

        // Keep only each player's best score (dedup by name), preserving score order.
        function dedupByBest(rows) {
            const seen = new Set();
            const result = [];
            for (const r of rows) {
                if (seen.has(r.name)) continue;
                seen.add(r.name);
                result.push(r);
            }
            return result;
        }

        async function fetchAndRenderRanking() {
            if (!sbClient) {
                ui.rankingList.innerHTML = '';
                ui.rankSummary.textContent = '—';
                ui.rankSummary.classList.remove('out');
                return;
            }
            ui.rankSummary.textContent = '...';
            ui.rankSummary.classList.remove('out');
            try {
                const { data, error } = await sbClient
                    .from('scores')
                    .select('id, name, score')
                    .eq('mode', selectedMode)
                    .gte('created_at', periodStartISO(rankPeriod))
                    .order('score', { ascending: false })
                    .order('created_at', { ascending: true })
                    .limit(1000);
                if (error) throw error;
                const best = dedupByBest(data || []).slice(0, 100);
                const selfRank = renderRankingRows(best, playerName);
                setRankSummary(selfRank);
            } catch (e) {
                console.warn('fetch ranking failed:', e);
                ui.rankingList.innerHTML = '';
                ui.rankSummary.textContent = '—';
            }
        }

        function createBlockData(isPreview = false) {
            const rand = Math.random();
            let type = 'normal';
            let colorIndices = [Math.floor(Math.random() * COLORS.length)];
            const cfg = getLevelConfig(level);
            
            if (cfg.effects.includes('zebra') && rand < 0.18) {
                type = 'zebra';
                const c1 = Math.floor(Math.random() * COLORS.length);
                let c2 = Math.floor(Math.random() * COLORS.length);
                while (c2 === c1) c2 = Math.floor(Math.random() * COLORS.length);
                colorIndices = [c1, c2];
            } else if (cfg.effects.includes('rainbow') && rand < 0.10) {
                type = 'rainbow';
                colorIndices = [0, 1, 2];
            } else if (cfg.effects.includes('ghost') && rand < 0.08) {
                type = 'ghost';
                colorIndices = [Math.floor(Math.random() * COLORS.length)];
            } else if (cfg.effects.includes('split') && rand < 0.12) {
                type = 'split';
                colorIndices = [Math.floor(Math.random() * COLORS.length)];
            }
            return { colorIndices, type };
        }
        
        function spawnBlock() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            const laneWidth = w * 0.70;
            const leftX = (w - laneWidth) / 2;
            const bridgeY = h - 100;
            const estimateFramesToBridge = (block) => (bridgeY - (block.y + block.height)) / Math.max(0.001, block.speed);
            if (!heavyBlockActive && score >= nextHeavyBlockScore) {
                const durability = getHeavyBlockDurability();
                const candidateBlock = {
                    y: -136,
                    height: 104,
                    speed: speed * 0.82
                };
                if (blocks.some(b => !b.passed && Math.abs(estimateFramesToBridge(candidateBlock) - estimateFramesToBridge(b)) <= 26)) {
                    spawnTimer = 8;
                    return;
                }
                heavyBlockActive = true;
                nextHeavyBlockScore += 240 + level * 45;
                updateHeavyBlockBadge(durability);
                blocks.push({
                    x: leftX + laneWidth / 2 - 52,
                    y: -136,
                    width: 104,
                    height: 104,
                    speed: speed * 0.82,
                    colorIndices: [Math.floor(Math.random() * COLORS.length)],
                    type: 'heavy',
                    rotation: 0,
                    passed: false,
                    pulse: 0,
                    opacity: 1,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    invuln: 0,
                    durability,
                    maxDurability: durability
                });
                heavyBlockCooldown = Math.max(30, 70 - level * 4);
                if (selectedMode === 'hard') heavyBlockCooldown -= 8;
                if (selectedMode === 'zen') heavyBlockCooldown += 10;
                if (lives === 1) heavyBlockCooldown += 10;
                if (lives === 1 && recoveryGauge >= 7) heavyBlockCooldown += 8;
                return;
            }
            
            generatePreview();
            const data = previewBlocks.shift();
            const candidateBlock = {
                y: -90,
                height: data.type === 'zebra' ? 72 : (data.type === 'rainbow' ? 56 : (data.type === 'ghost' ? 72 : 62)),
                speed: speed * (0.9 + Math.random() * 0.2)
            };
            if (blocks.some(b => !b.passed && Math.abs(estimateFramesToBridge(candidateBlock) - estimateFramesToBridge(b)) <= 26)) {
                spawnTimer = 8;
                return;
            }
            
            blocks.push({
                x: leftX + Math.random() * (laneWidth - 70),
                y: -90,
                width: candidateBlock.height,
                height: candidateBlock.height,
                speed: candidateBlock.speed,
                colorIndices: data.colorIndices,
                type: data.type,
                rotation: 0,
                passed: false,
                pulse: 0,
                opacity: data.type === 'ghost' ? 0.4 : 1,
                wobbleOffset: Math.random() * Math.PI * 2,
                invuln: 0
            });
        }

        function gameLoop(timestamp) {
            if (state !== 'playing') return;
            if (isPaused) return;
            const dt = Math.min((timestamp - lastTime) / 16.67, 3);
            lastTime = timestamp;
            
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            const bridgeY = h - 100;
            const mode = MODES[selectedMode];
            const cfg = getLevelConfig(level);
            
            difficulty = 1 + score / (selectedMode === 'hard' ? 450 : 2100) + cfg.speedAdd * 0.15;
            baseSpeed = (2.6 + difficulty * 0.7 + cfg.speedAdd) * mode.speedMult;
            speed = baseSpeed;
            
            spawnTimer -= dt;
            if (heavyBlockCooldown > 0) heavyBlockCooldown -= dt;
            if (lifeOneRescueCooldown > 0) lifeOneRescueCooldown -= dt;
            const spawnRate = Math.max(22, (70 - difficulty * 5) * mode.spawnMult);
            if (spawnTimer <= 0) {
                if (heavyBlockCooldown <= 0) {
                    spawnBlock();
                    spawnTimer = spawnRate + Math.random() * 16;
                } else {
                    spawnTimer = Math.min(spawnRate + Math.random() * 8, 14 + heavyBlockCooldown * 0.3);
                }
            }
            
            bridgePulse = Math.max(0, bridgePulse - 0.08 * dt);
            
            if (feverActive) {
                feverTimer -= 0.01 * dt;
                backgroundHue += 2 * dt;
                if (feverTimer <= 0) {
                    feverActive = false;
                    ui.feverBadge.style.opacity = '0';
                }
            }
            
            // Rainbow Bridge: every 15 combo, 5 seconds of any-color success
            if (rainbowBridgeActive) {
                rainbowBridgeTimer -= dt;
                if (rainbowBridgeTimer <= 0) {
                    rainbowBridgeActive = false;
                    ui.rainbowBadge.style.opacity = '0';
                }
            }
            
            // Safe start timer
            if (safeTime > 0) {
                safeTime -= dt;
                if (safeTime <= 0) {
                    ui.safeBadge.style.opacity = '0';
                }
            }
            
            // Save chance timer
            if (saveChanceActive) {
                saveChanceTimer -= dt;
                if (saveChanceTimer <= 0) {
                    saveChanceActive = false;
                    saveChanceBlock = null;
                    ui.saveBadge.style.opacity = '0';
                }
            }
            
            for (let b of blocks) {
                b.y += b.speed * dt;
                b.invuln = Math.max(0, (b.invuln || 0) - dt);
                b.rotation += cfg.effects.includes('fastspin') ? 0.06 * dt : 0.025 * dt;
                b.pulse = Math.sin(timestamp * 0.012) * 0.08;
                if (b.type === 'ghost') b.opacity = 0.35 + Math.sin(timestamp * 0.008) * 0.15;
                if (cfg.effects.includes('wobble')) {
                    b.x += Math.sin(timestamp * 0.005 + b.wobbleOffset) * 0.4 * dt;
                }
                if (cfg.effects.includes('shrink')) {
                    const shrink = Math.max(0.6, 1 - (level - 49) * 0.002);
                    b.width = (b.type === 'zebra' ? 72 : (b.type === 'rainbow' ? 56 : (b.type === 'ghost' ? 72 : 62))) * shrink;
                    b.height = b.width;
                }
                
                if (!b.passed && !b.saveChance && (b.invuln || 0) <= 0 && b.y + b.height >= bridgeY && b.y <= bridgeY + 30) {
                    const currentColor = COLORS[currentColorIndex].name;
                    const blockColors = b.colorIndices.map(i => COLORS[i].name);
                    const isMatch = blockColors.includes(currentColor);
                    const isRainbow = b.type === 'rainbow';
                    
                    if (b.type === 'heavy') {
                        if (isMatch || isRainbow || rainbowBridgeActive) {
                            combo++;
                            if (combo > maxCombo) maxCombo = combo;
                            b.durability--;
                            b.invuln = 20;
                            const hitColor = rainbowBridgeActive ? '#ffffff' : COLORS[currentColorIndex].hex;
                            createSuccessEffect(b.x + b.width / 2, bridgeY, hitColor);
                            if (b.durability > 0) {
                                score += Math.floor(25 * mode.scoreMult);
                                ui.score.textContent = score;
                                ui.combo.textContent = 'x' + combo;
                                ui.combo.style.opacity = combo >= 2 ? '1' : '0';
                                b.y = bridgeY - b.height - 28;
                                updateHeavyBlockBadge(b.durability);
                                SoundManager.playHeavyHit();
                                addFloatingText('HIT!', w / 2, bridgeY - 62, '#ffdd33');
                                continue;
                            }
                            b.passed = true;
                            heavyBlockActive = false;
                            heavyBlockCooldown = 0;
                            updateHeavyBlockBadge(0);
                            blocksCleared++;
                            const heavyDestroyPoints = Math.floor(140 * mode.scoreMult);
                            score += heavyDestroyPoints;
                            ui.score.textContent = score;
                            ui.combo.textContent = 'x' + combo;
                            ui.combo.style.opacity = combo >= 2 ? '1' : '0';
                            if (selectedMode !== 'hard') updateRecoveryGauge(4);
                            SoundManager.playHeavyBreak();
                            addFloatingText('CRUSHED!', w / 2, bridgeY - 70, '#ffffff');
                            createExplosion(b.x + b.width / 2, bridgeY, '#ffffff', 34);
                            checkLevelUp();
                            continue;
                        }
                        if (selectedMode === 'zen') {
                            b.invuln = 16;
                            b.y = bridgeY - b.height - 20;
                            createSuccessEffect(b.x + b.width / 2, bridgeY, '#ffffff');
                            continue;
                        }
                    }

                    if (isMatch || isRainbow || rainbowBridgeActive) {
                        b.passed = true;
                        combo++;
                        if (combo > maxCombo) maxCombo = combo;
                        blocksCleared++;

                        if (saveChanceActive && b === saveChanceBlock) {
                            saveChanceActive = false;
                            saveChanceTimer = 0;
                            saveChanceBlock = null;
                            if (selectedMode !== 'hard') updateRecoveryGauge(5);
                            SoundManager.playSuccess();
                            ui.saveBadge.style.opacity = '0';
                            addFloatingText('SAVED!', w / 2, bridgeY - 70, '#00ff88');
                            createExplosion(b.x + b.width / 2, bridgeY, '#00ff88', 24);
                        }

                        if (combo >= mode.feverThreshold && !feverActive) {
                            feverActive = true;
                            feverTimer = 1;
                            ui.feverBadge.style.opacity = '1';
                        }

                        if (combo > 0 && combo % 15 === 0 && !rainbowBridgeActive) {
                            rainbowBridgeActive = true;
                            rainbowBridgeTimer = 300;
                            ui.rainbowBadge.style.opacity = '1';
                            addFloatingText('RAINBOW!', w / 2, bridgeY - 80, '#ffffff');
                        }

                        const basePoints = isRainbow ? 30 : 10;
                        const comboBonus = Math.floor(combo / 5) * 5;
                        const feverMult = feverActive ? 2 : 1;
                        const gained = Math.floor((basePoints + comboBonus) * feverMult * mode.scoreMult);
                        score += gained;
                        ui.score.textContent = score;
                        SoundManager.playSuccess();
                        updateRecoveryGauge(1);
                        checkLevelUp();

                        ui.combo.textContent = 'x' + combo;
                        ui.combo.style.opacity = combo >= 2 ? '1' : '0';

                        const color = isRainbow || rainbowBridgeActive ? '#ffffff' : COLORS[currentColorIndex].hex;
                        createSuccessEffect(b.x + b.width / 2, bridgeY, color);
                        
                        // Enhanced feedback texts
                        if (!firstSuccessShown) {
                            firstSuccessShown = true;
                            addFloatingText('NICE!', w/2, bridgeY - 55, '#ffffff');
                        } else if (combo === 2) {
                            addFloatingText('GOOD!', w/2, bridgeY - 55, '#4da6ff');
                        } else if (combo === 3) {
                            addFloatingText('GREAT!', w/2, bridgeY - 55, '#00ff88');
                        } else if (combo === 5) {
                            addFloatingText('PERFECT!', w/2, bridgeY - 55, '#ffdd33');
                        } else if (combo % 5 === 0) {
                            addFloatingText(`x${combo}`, w/2, bridgeY - 45, '#ffdd33');
                        }
                    } else {
                        // Zen mode: no damage, keep combo, peaceful pass
                        if (selectedMode === 'zen') {
                            b.passed = true;
                            createSuccessEffect(b.x + b.width/2, bridgeY, '#ffffff');
                            continue;
                        }
                        
                        // Safe start: no damage for first 2 seconds
                        if (safeTime > 0) {
                            b.passed = true;
                            addFloatingText('SAFE!', w/2, bridgeY - 55, '#00ff88');
                            createSuccessEffect(b.x + b.width/2, bridgeY, '#00ff88');
                            continue;
                        }

                        if (selectedMode !== 'hard' && selectedMode !== 'zen' && lives === 1 && lifeOneRescueCooldown <= 0 && recoveryGauge >= 3) {
                            b.passed = true;
                            combo = 0;
                            ui.combo.style.opacity = '0';
                            recoveryGauge = Math.max(0, recoveryGauge - 3);
                            lifeOneRescueCooldown = 72;
                            updateRecoveryUI();
                            SoundManager.playDamage();
                            damageOverlayAlpha = 0.18;
                            shake = 8;
                            addFloatingText('RESCUE!', w/2, bridgeY - 60, '#00ff88');
                            createSuccessEffect(b.x + b.width/2, bridgeY, '#00ff88');
                            continue;
                        }
                        
                        // Miracle save: first mistake per game gives a chance to recover
                        if (!saveChanceActive && totalMistakes === 0) {
                            saveChanceActive = true;
                            saveChanceTimer = 48;
                            saveChanceBlock = b;
                            b.saveChance = true;
                            totalMistakes++;
                            b.passed = false;
                            lives--;
                            updateLivesUI();
                            SoundManager.playDamage();
                            damageOverlayAlpha = 0.25;
                            shake = 14;
                            combo = 0;
                            ui.combo.style.opacity = '0';
                            recoveryGauge = Math.max(0, recoveryGauge - 3);
                            updateRecoveryUI();
                            ui.saveBadge.style.opacity = '1';
                            addFloatingText('OUCH!', w/2, bridgeY - 55, '#ff3333');
                            addFloatingText('SWITCH COLOR!', w/2, bridgeY - 80, '#ffdd33');
                            createDamageEffect(w, h);
                            continue;
                        }
                        
                        lives--;
                        updateLivesUI();
                        SoundManager.playDamage();
                        damageOverlayAlpha = 0.35;
                        createDamageEffect(w, h);
                        shake = 22;
                        combo = 0;
                        ui.combo.style.opacity = '0';
                        recoveryGauge = Math.max(0, recoveryGauge - 3);
                        updateRecoveryUI();
                        b.passed = true;
                        totalMistakes++;
                        
                        if (!saveChanceActive) {
                            addFloatingText('OUCH!', w/2, bridgeY - 55, '#ff3333');
                        } else {
                            saveChanceActive = false;
                            saveChanceTimer = 0;
                            saveChanceBlock = null;
                            ui.saveBadge.style.opacity = '0';
                        }
                        
                        if (lives <= 0) {
                            gameOver();
                            return;
                        }
                    }
                }
            }
            
            blocks = blocks.filter(b => {
                if (b.y > h + 50 && !b.passed) {
                    if (saveChanceActive && b === saveChanceBlock) {
                        saveChanceActive = false;
                        saveChanceBlock = null;
                        saveChanceTimer = 0;
                        ui.saveBadge.style.opacity = '0';
                    } else if (b.type === 'heavy') {
                        heavyBlockActive = false;
                        heavyBlockCooldown = 0;
                        updateHeavyBlockBadge(0);
                        ui.combo.style.opacity = '0';
                    }
                    return false;
                }
                return b.y < h + 120;
            });
            
            particles = particles.filter(p => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 0.035 * dt;
                if (p.type === 'explosion') p.vy += 0.3 * dt;
                if (p.type === 'success') p.vy += 0.2 * dt;
                if (p.type === 'levelup') {
                    p.vx *= 0.97;
                    p.vy *= 0.97;
                }
                if (p.type === 'damage') {
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                }
                return p.life > 0;
            });
            
            texts = texts.filter(t => {
                t.y += t.vy * dt;
                t.life -= 0.025 * dt;
                return t.life > 0;
            });
            
            if (ui.score.textContent !== String(score)) ui.score.textContent = score;
            draw(w, h, bridgeY);
            requestAnimationFrame(gameLoop);
        }
        
        function draw(w, h, bridgeY) {
            const color = COLORS[currentColorIndex];
            const cfg = getLevelConfig(level);
            
            if (feverActive) {
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, `hsl(${backgroundHue}, 70%, 9%)`);
                grad.addColorStop(1, `hsl(${(backgroundHue + 60) % 360}, 70%, 14%)`);
                ctx.fillStyle = grad;
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0a0a12');
                grad.addColorStop(1, '#121220');
                ctx.fillStyle = grad;
            }
            ctx.fillRect(0, 0, w, h);
            
            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
                shake *= 0.9;
                if (shake < 0.5) shake = 0;
            }
            
            const laneWidth = w * 0.70;
            const laneX = (w - laneWidth) / 2;
            ctx.fillStyle = feverActive ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)';
            ctx.fillRect(laneX, 0, laneWidth, h);
            
            ctx.strokeStyle = feverActive ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const y = (h / 8) * i;
                ctx.beginPath();
                ctx.moveTo(laneX, y);
                ctx.lineTo(laneX + laneWidth, y);
                ctx.stroke();
            }
            
            drawPreview(w, h);
            
            for (let b of blocks) drawBlock(b, cfg);
            drawBridge(w, bridgeY);
            drawDamageOverlay(w, h);
            
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = p.type === 'levelup' ? 12 : (p.type === 'damage' ? 10 : 5);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
            
            for (let t of texts) {
                ctx.save();
                ctx.globalAlpha = t.life;
                ctx.fillStyle = t.color;
                ctx.font = '900 22px Montserrat, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = t.color;
                ctx.shadowBlur = 15;
                ctx.fillText(t.text, t.x, t.y);
                ctx.restore();
            }
            
            ctx.restore();
        }
        
        function drawPreview(w, h) {
            generatePreview();
            const size = 28;
            const gap = 38;
            const startX = w/2 - gap/2 - size;
            const y = 36;
            
            for (let i = 0; i < 2; i++) {
                const pb = previewBlocks[i];
                const x = startX + i * gap;
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.translate(x, y);
                if (pb.type === 'rainbow') {
                    const grad = ctx.createLinearGradient(-size/2, 0, size/2, 0);
                    grad.addColorStop(0, COLORS[0].hex);
                    grad.addColorStop(0.5, COLORS[1].hex);
                    grad.addColorStop(1, COLORS[2].hex);
                    ctx.fillStyle = grad;
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 10;
                } else if (pb.type === 'zebra') {
                    const stripeW = size / 2;
                    for (let j = 0; j < 2; j++) {
                        ctx.fillStyle = COLORS[pb.colorIndices[j % pb.colorIndices.length]].hex;
                        ctx.fillRect(-size/2 + j * stripeW, -size/2, stripeW, size);
                    }
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.strokeRect(-size/2, -size/2, size, size);
                    ctx.restore();
                    continue;
                } else {
                    ctx.fillStyle = COLORS[pb.colorIndices[0]].hex;
                    ctx.shadowColor = COLORS[pb.colorIndices[0]].hex;
                    ctx.shadowBlur = 8;
                }
                ctx.beginPath();
                ctx.roundRect(-size/2, -size/2, size, size, 6);
                ctx.fill();
                ctx.restore();
            }
            
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '700 10px Montserrat, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('NEXT', w/2, 16);
        }
        
        function drawBlock(b, cfg) {
            const cx = b.x + b.width / 2;
            const cy = b.y + b.height / 2;
            const scale = 1 + b.pulse;
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(b.rotation);
            ctx.scale(scale, scale);
            ctx.globalAlpha = b.opacity;
            
            if (b.type === 'heavy') {
                const color = COLORS[b.colorIndices[0]];
                ctx.fillStyle = color.hex;
                ctx.shadowColor = color.hex;
                ctx.shadowBlur = 28;
                ctx.beginPath();
                ctx.roundRect(-b.width/2, -b.height/2, b.width, b.height, 16);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                const hpWidth = b.width - 18;
                const hpRatio = b.durability / b.maxDurability;
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.fillRect(-hpWidth/2, b.height/2 - 16, hpWidth, 8);
                ctx.fillStyle = '#fff';
                ctx.fillRect(-hpWidth/2, b.height/2 - 16, hpWidth * hpRatio, 8);
                ctx.fillStyle = '#fff';
                ctx.font = '900 18px Montserrat, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('x' + b.durability, 0, -4);
            } else if (b.type === 'rainbow') {
                const grad = ctx.createLinearGradient(-b.width/2, 0, b.width/2, 0);
                grad.addColorStop(0, COLORS[0].hex);
                grad.addColorStop(0.5, COLORS[1].hex);
                grad.addColorStop(1, COLORS[2].hex);
                ctx.fillStyle = grad;
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.roundRect(-b.width/2, -b.height/2, b.width, b.height, 10);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                ctx.fillText('RAINBOW', 0, 0);
            } else if (b.type === 'zebra') {
                const stripeCount = 4;
                const stripeW = b.width / stripeCount;
                for (let i = 0; i < stripeCount; i++) {
                    const colorIdx = b.colorIndices[i % b.colorIndices.length];
                    ctx.fillStyle = COLORS[colorIdx].hex;
                    ctx.fillRect(-b.width/2 + i * stripeW, -b.height/2, stripeW, b.height);
                }
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(-b.width/2, -b.height/2, b.width, b.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('!', 0, 0);
            } else if (b.type === 'ghost') {
                const color = COLORS[b.colorIndices[0]];
                ctx.fillStyle = color.hex;
                ctx.shadowColor = color.hex;
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.roundRect(-b.width/2, -b.height/2, b.width, b.height, 10);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                const color = COLORS[b.colorIndices[0]];
                ctx.fillStyle = color.hex;
                ctx.shadowColor = color.hex;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.roundRect(-b.width/2, -b.height/2, b.width, b.height, 10);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.roundRect(-b.width/2 + 4, -b.height/2 + 4, b.width - 8, b.height/2 - 4, 6);
                ctx.fill();
            }
            ctx.restore();
        }
        
        function drawBridge(w, bridgeY) {
            const bridgeHeight = 26;
            const color = rainbowBridgeActive ? { hex: '#ffffff' } : COLORS[currentColorIndex];
            const pulseSize = bridgePulse * 12;
            const specialScale = (feverActive || rainbowBridgeActive) ? 1.06 : 1;
            
            ctx.save();
            ctx.translate(w/2, bridgeY + bridgeHeight/2);
            ctx.scale(specialScale, specialScale);
            ctx.translate(-(w-36)/2, -bridgeHeight/2);
            
            ctx.shadowColor = color.hex;
            ctx.shadowBlur = 30 + pulseSize + (feverActive ? 20 : 0);
            const gradient = ctx.createLinearGradient(0, 0, 0, bridgeHeight);
            gradient.addColorStop(0, color.hex);
            gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, w - 36, bridgeHeight, 14);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.roundRect(5, 4, w - 46, 5, 2);
            ctx.fill();
            ctx.restore();
            
            const indicatorY = bridgeY + 50;
            const dotSize = 10;
            const gap = 26;
            const startX = w/2 - ((COLORS.length - 1) * gap) / 2;
            
            for (let i = 0; i < COLORS.length; i++) {
                const x = startX + i * gap;
                ctx.beginPath();
                ctx.arc(x, indicatorY, dotSize, 0, Math.PI * 2);
                if (i === currentColorIndex) {
                    ctx.fillStyle = COLORS[i].hex;
                    ctx.shadowColor = COLORS[i].hex;
                    ctx.shadowBlur = 18;
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.18)';
                    ctx.shadowBlur = 0;
                    ctx.fill();
                }
            }
        }
        
        function drawDamageOverlay(w, h) {
            if (damageOverlayAlpha > 0) {
                ctx.fillStyle = `rgba(255, 30, 30, ${damageOverlayAlpha})`;
                ctx.fillRect(0, 0, w, h);
                damageOverlayAlpha -= 0.03;
            }
        }
        
        function drawStartBackground() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#0a0a12');
            grad.addColorStop(1, '#121220');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        drawStartBackground();
    </script>
</body>
